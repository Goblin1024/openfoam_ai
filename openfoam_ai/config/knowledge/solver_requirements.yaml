# ============================================================================
# 湍流模型配置
# ============================================================================

turbulence_models:
  laminar:
    description: "层流"
    simulation_type: laminar
    fields: []
    
  kEpsilon:
    description: "标准k-ε湍流模型"
    simulation_type: RAS
    fields:
      - k
      - epsilon
      - nut
    wall_function_compatible: true
    yplus_requirement: "y+ > 30"
    
  realizableKE:
    description: "可实现k-ε湍流模型"
    simulation_type: RAS
    fields:
      - k
      - epsilon
      - nut
    wall_function_compatible: true
    yplus_requirement: "y+ > 30"
    
  kOmegaSST:
    description: "k-ω SST湍流模型（Menter）"
    simulation_type: RAS
    fields:
      - k
      - omega
      - nut
    wall_function_compatible: false
    yplus_requirement: "y+ < 1 (推荐) 或 y+ > 30"
    
  kOmega:
    description: "标准k-ω湍流模型"
    simulation_type: RAS
    fields:
      - k
      - omega
      - nut
    wall_function_compatible: false
    yplus_requirement: "y+ < 1"
    
  SpalartAllmaras:
    description: "Spalart-Allmaras一方程模型"
    simulation_type: RAS
    fields:
      - nuTilda
      - nut
    wall_function_compatible: true
    yplus_requirement: "y+ > 30 (壁面函数) 或 y+ < 1 (低Re)"

  LES:
    description: "大涡模拟"
    simulation_type: LES
    fields:
      - k
      - nut
    wall_function_compatible: false
    yplus_requirement: "y+ < 1"
    note: "需要非常精细的网格"

# ============================================================================
# 热物性模型配置
# ============================================================================

thermophysical_models:
  # 不可压缩传热
  heRhoThermo:
    description: "可变密度传热模型（用于浮力驱动流）"
    thermo_type: heRhoThermo<pureMixture<const<rhoThermoPhysics>>
    suitable_for:
      - buoyantSimpleFoam
      - buoyantPimpleFoam
      
  # 可压缩流
  hePsiThermo:
    description: "可压缩传热模型"
    thermo_type: hePsiThermo<pureMixture<const<psiThermoPhysics>>
    suitable_for:
      - rhoSimpleFoam
      - rhoPimpleFoam
      
  # Boussinesq近似
  Boussinesq:
    description: "Boussinesq近似传热模型"
    suitable_for:
      - buoyantBoussinesqSimpleFoam

