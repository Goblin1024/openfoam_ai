# OpenFOAM 求解器需求配置
# 定义每个求解器需要的字典文件和初始场

# ============================================================================
# 不可压缩流求解器
# ============================================================================

icoFoam:
  description: "不可压缩层流瞬态求解器"
  physics:
    compressible: false
    phases: single
    heat_transfer: false
    turbulence: laminar
    time: transient
  required_dicts:
    - blockMeshDict
    - controlDict
    - fvSchemes
    - fvSolution
    - transportProperties
  initial_fields:
    - name: p
      type: volScalarField
      dimensions: [0, 2, -2, 0, 0, 0, 0]
      default_internal: 0
    - name: U
      type: volVectorField
      dimensions: [0, 1, -1, 0, 0, 0, 0]
      default_internal: [0, 0, 0]

pisoFoam:
  description: "不可压缩层流瞬态求解器（PISO算法）"
  physics:
    compressible: false
    phases: single
    heat_transfer: false
    turbulence: laminar
    time: transient
  required_dicts:
    - blockMeshDict
    - controlDict
    - fvSchemes
    - fvSolution
    - transportProperties
  initial_fields:
    - name: p
      type: volScalarField
      dimensions: [0, 2, -2, 0, 0, 0, 0]
      default_internal: 0
    - name: U
      type: volVectorField
      dimensions: [0, 1, -1, 0, 0, 0, 0]
      default_internal: [0, 0, 0]

simpleFoam:
  description: "不可压缩稳态湍流求解器"
  physics:
    compressible: false
    phases: single
    heat_transfer: false
    turbulence: RAS
    time: steady
  required_dicts:
    - blockMeshDict
    - controlDict
    - fvSchemes
    - fvSolution
    - transportProperties
    - turbulenceProperties
  initial_fields:
    - name: p
      type: volScalarField
      dimensions: [0, 2, -2, 0, 0, 0, 0]
      default_internal: 0
    - name: U
      type: volVectorField
      dimensions: [0, 1, -1, 0, 0, 0, 0]
      default_internal: [0, 0, 0]
    - name: k
      type: volScalarField
      dimensions: [0, 2, -2, 0, 0, 0, 0]
      default_internal: 0.1
    - name: epsilon
      type: volScalarField
      dimensions: [0, 2, -3, 0, 0, 0, 0]
      default_internal: 0.01
    - name: omega
      type: volScalarField
      dimensions: [0, 0, -1, 0, 0, 0, 0]
      default_internal: 1
      note: "用于kOmegaSST/kOmega模型，替代epsilon"
    - name: nut
      type: volScalarField
      dimensions: [0, 2, -1, 0, 0, 0, 0]
      default_internal: 0

pimpleFoam:
  description: "不可压缩瞬态湍流求解器（大时间步PIMPLE算法）"
  physics:
    compressible: false
    phases: single
    heat_transfer: false
    turbulence: RAS
    time: transient
  required_dicts:
    - blockMeshDict
    - controlDict
    - fvSchemes
    - fvSolution
    - transportProperties
    - turbulenceProperties
  initial_fields:
    - name: p
      type: volScalarField
      dimensions: [0, 2, -2, 0, 0, 0, 0]
      default_internal: 0
    - name: U
      type: volVectorField
      dimensions: [0, 1, -1, 0, 0, 0, 0]
      default_internal: [0, 0, 0]
    - name: k
      type: volScalarField
      dimensions: [0, 2, -2, 0, 0, 0, 0]
      default_internal: 0.1
    - name: epsilon
      type: volScalarField
      dimensions: [0, 2, -3, 0, 0, 0, 0]
      default_internal: 0.01
    - name: omega
      type: volScalarField
      dimensions: [0, 0, -1, 0, 0, 0, 0]
      default_internal: 1
      note: "用于kOmegaSST/kOmega模型，替代epsilon"
    - name: nut
      type: volScalarField
      dimensions: [0, 2, -1, 0, 0, 0, 0]
      default_internal: 0

# ============================================================================
# 传热求解器
# ============================================================================

buoyantSimpleFoam:
  description: "浮力驱动不可压缩稳态传热求解器"
  physics:
    compressible: false
    phases: single
    heat_transfer: true
    turbulence: RAS
    time: steady
  required_dicts:
    - blockMeshDict
    - controlDict
    - fvSchemes
    - fvSolution
    - thermophysicalProperties
    - turbulenceProperties
    - g
  initial_fields:
    - name: p_rgh
      type: volScalarField
      dimensions: [1, -1, -2, 0, 0, 0, 0]
      default_internal: 0
    - name: p
      type: volScalarField
      dimensions: [1, -1, -2, 0, 0, 0, 0]
      default_internal: 101325
    - name: U
      type: volVectorField
      dimensions: [0, 1, -1, 0, 0, 0, 0]
      default_internal: [0, 0, 0]
    - name: T
      type: volScalarField
      dimensions: [0, 0, 0, 1, 0, 0, 0]
      default_internal: 300
    - name: k
      type: volScalarField
      dimensions: [0, 2, -2, 0, 0, 0, 0]
      default_internal: 0.1
    - name: epsilon
      type: volScalarField
      dimensions: [0, 2, -3, 0, 0, 0, 0]
      default_internal: 0.01
    - name: omega
      type: volScalarField
      dimensions: [0, 0, -1, 0, 0, 0, 0]
      default_internal: 1
      note: "用于kOmegaSST/kOmega模型，替代epsilon"
    - name: nut
      type: volScalarField
      dimensions: [0, 2, -1, 0, 0, 0, 0]
      default_internal: 0
    - name: alphat
      type: volScalarField
      dimensions: [0, 2, -1, 0, 0, 0, 0]
      default_internal: 0

