# ============================================================================
# 边界条件模板
# ============================================================================

boundary_condition_templates:
  # 速度场 U
  U_inlet:
    type: fixedValue
    value: uniform (1 0 0)
    description: "入口速度"
    
  U_outlet:
    type: zeroGradient
    description: "出口速度"
    
  U_wall:
    type: noSlip
    description: "壁面无滑移"
    
  U_wall_moving:
    type: fixedValue
    value: uniform (1 0 0)
    description: "移动壁面"
    
  U_symmetry:
    type: symmetry
    description: "对称面"
    
  U_empty:
    type: empty
    description: "2D前后表面"

  # 压力场 p / p_rgh
  p_inlet:
    type: zeroGradient
    description: "入口压力"
    
  p_outlet:
    type: fixedValue
    value: uniform 0
    description: "出口压力"
    
  p_wall:
    type: zeroGradient
    description: "壁面压力"
    
  p_symmetry:
    type: symmetry
    description: "对称面"
    
  p_empty:
    type: empty
    description: "2D前后表面"

  # 温度场 T
  T_inlet:
    type: fixedValue
    value: uniform 300
    description: "入口温度"
    
  T_outlet:
    type: zeroGradient
    description: "出口温度"
    
  T_wall:
    type: fixedValue
    value: uniform 350
    description: "固定温度壁面"
    
  T_wall_heatflux:
    type: externalWallHeatFlux
    mode: flux
    q: uniform 1000
    description: "热流壁面"
    
  T_wall_adiabatic:
    type: zeroGradient
    description: "绝热壁面"

  # 湍流场 k, epsilon, omega, nut
  k_inlet:
    type: fixedValue
    value: uniform 0.1
    description: "入口湍动能"
    
  k_wall:
    type: kqRWallFunction
    value: uniform 0.1
    description: "壁面湍动能"
    
  epsilon_inlet:
    type: fixedValue
    value: uniform 0.01
    description: "入口耗散率"
    
  epsilon_wall:
    type: epsilonWallFunction
    value: uniform 0.01
    description: "壁面耗散率"
    
  omega_inlet:
    type: fixedValue
