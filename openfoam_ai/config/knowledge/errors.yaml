# CFD错误知识库
# 包含常见错误类型、症状、解释和解决方案

mesh_too_coarse:
  name: 网格过于稀疏
  symptom: 结果不精确，梯度区域被抹平，或无法捕捉关键流动特征
  explanation: |
    网格就像照片的像素——像素太少，图像就模糊。同样，网格太稀疏，
    流动细节就会被"抹平"，无法准确捕捉速度梯度、压力变化等关键特征。

    常见表现：
    • 边界层速度剖面不准确
    • 涡旋结构丢失
    • 分离点位置错误
    • 阻力/升力系数与参考值偏差大
  solution: |
    修复建议：
    1. 增加网格数量，特别是梯度大的区域
    2. 在壁面、尾流、剪切层区域局部加密
    3. 进行网格无关性验证
    4. 检查长宽比和正交性质量

    具体措施：
    • 2D问题至少50x50网格
    • 边界层内至少10-20层网格
    • 尾流区加密5-10倍特征长度

mesh_too_fine:
  name: 网格过于细密
  symptom: 计算时间过长，资源消耗过大，收益递减
  explanation: |
    网格越密越精确，但计算成本也急剧增加。当网格细化带来的精度提升
    小于计算成本增加时，就是"过犹不及"。

    问题：
    • 计算时间太长，影响工作效率
    • 内存不足，无法运行
    • 小时间步限制（受CFL条件）
    • 舍入误差累积
  solution: |
    优化策略：
    1. 进行网格无关性研究，找到最佳平衡点
    2. 只在关键区域加密，其他区域保持稀疏
    3. 使用自适应网格细化（AMR）
    4. 考虑使用壁面函数减少边界层网格数

    评估方法：
    • 对比不同网格密度的结果
    • 当结果差异<5%时，较粗的网格即可接受
    • 监控y+值，避免过度加密

cfl_violation:
  name: CFL条件违反
  symptom: 瞬态计算发散，残差急剧增大，出现非物理值
  explanation: |
    CFL条件是显式时间积分的稳定性判据。它要求在一个时间步内，
    信息传播不能超过一个网格单元。就像跑步时步子不能太大，
    否则会"踩空"导致数值不稳定。

    库朗数 Co = U × Δt / Δx
    • Co > 1：显式格式不稳定
    • Co > 5：隐式格式可能不稳定
    • Co < 1：通常安全
  solution: |
    修复方法：
    1. 减小时间步：deltaT = 0.5 × Δx / U_max
    2. 启用可调时间步：adjustTimeStep yes
    3. 在关键区域加密网格（减小Δx）
    4. 改用隐式格式（但会降低时间精度）

    预防措施：
    • 估算最大流速和最小网格尺寸
    • 初始时间步设保守值
    • 监控日志中的库朗数报告

divergence_courant:
  name: 库朗数导致发散
  symptom: 残差突然增大，速度/压力值异常，计算崩溃
  explanation: |
    库朗数过大是瞬态计算发散的最常见原因。当流体在一个时间步内
    移动超过一个网格单元，数值信息传递跟不上物理传播，导致
    计算失稳。

    特征：
    • 发散前库朗数报告值很大
    • 通常发生在流速突然增大的区域
    • 局部网格过粗会加剧问题
  solution: |
    立即处理：
    1. 减小deltaT 10倍，重新运行
    2. 在controlDict中设置maxCo < 1
    3. 在高速区域局部加密网格

    长期方案：
    • 使用adjustTimeStep自动调整
    • 初始阶段用更小的时间步
    • 检查是否有局部高速射流或激波

divergence_residual:
  name: 残差发散
  symptom: 残差曲线持续上升或振荡不收敛
  explanation: |
    残差表示方程不满足的程度。正常情况下应单调下降至阈值以下。
    残差发散说明数值解正在偏离真解。

    可能原因：
    • 边界条件设置错误（过约束/欠约束）
    • 松弛因子过大
    • 网格质量差（非正交性高）
    • 物理参数不合理（如Re过高）
    • 初始条件与边界条件不匹配
  solution: |
    排查步骤：
    1. 检查边界条件是否匹配（入口速度+出口压力）
    2. 减小松弛因子（压力0.1-0.2，速度0.5）
    3. 改善网格质量（检查checkMesh报告）
    4. 用更简单的初始条件（如势流初始化）
    5. 检查物性参数数量级

    调试技巧：
    • 先用层流、粗网格测试
    • 逐步增加复杂度
    • 监控特定位置的值变化

divergence_stall:
  name: 残差停滞
  symptom: 残差下降到一定程度后不再下降，或下降极慢
  explanation: |
    残差停滞表示求解器"卡住"了，无法进一步改进解。这通常意味着：
    • 网格质量限制了精度
    • 物理模型有缺陷（如湍流模型不适用）
    • 存在数值伪扩散
    • 解已经接近该离散格式的极限

    注意：残差停滞不代表解一定错误，需结合物理量监控判断
  solution: |
    改进策略：
    1. 检查力系数、流量等物理量是否已稳定
    2. 改用更高阶离散格式
    3. 局部加密关键区域网格
    4. 调整松弛因子（有时增大反而有帮助）
    5. 使用更好的线性求解器（如GAMG）

    判断标准：
    • 如果物理量已稳定，可以接受
    • 如果物理量仍在变化，需继续改进
    • 尝试用不同初始值重新计算

solver_incompatible:
  name: 求解器不兼容
  symptom: 求解器无法处理指定的物理模型，或结果明显错误
  explanation: |
    每个求解器都有适用范围，选择不当会导致：
    • icoFoam用于可压流：密度变化被忽略，结果错误
    • simpleFoam用于瞬态问题：无法捕捉非定常效应
    • 层流求解器用于湍流：结果完全不匹配

    常见不兼容：
    • 马赫数>0.3却用不可压求解器
    • 高雷诺数却用层流假设
    • 多相流却用单相求解器
  solution: |
    求解器选择指南：
    • 不可压层流瞬态：icoFoam
    • 不可压湍流稳态：simpleFoam
    • 不可压湍流瞬态：pimpleFoam
    • 可压流动：rhoPimpleFoam
    • 多相流：interFoam
    • 自然对流：buoyantBoussinesqPimpleFoam

    验证方法：
    • 检查雷诺数和马赫数
    • 确认物理现象（稳态/瞬态、单相/多相）
    • 参考OpenFOAM用户指南的求解器列表

boundary_mismatch:
  name: 边界条件不匹配
  symptom: 残差不收敛，结果非物理，或求解器报错
  explanation: |
    边界条件是CFD问题的定义。设置不当会导致：
    • 过约束：同时指定速度和压力（除特殊情况）
    • 欠约束：没有足够条件确定唯一解
    • 不匹配：边界类型与物理实际不符

    常见问题：
    • 入口和出口都指定速度（质量不守恒）
    • 所有边界都是壁面（无出口）
    • 出口有回流却用zeroGradient
    • 对称边界实际有穿过流动
  solution: |
    正确设置原则：
    • 亚音速入口：固定速度，压力零梯度
    • 亚音速出口：固定压力，速度零梯度
    • 壁面：无滑移（noSlip）或滑移（slip）
    • 有回流时：用inletOutlet/outletInlet

    检查清单：
    □ 确保质量守恒（入口流量=出口流量）
    □ 检查边界法向方向
    □ 验证边界类型与物理一致
    □ 封闭域需设定压力参考点

physical_unrealistic:
  name: 物理参数不合理
  symptom: 结果明显违背物理直觉，如负压力、超光速流动
  explanation: |
    物理参数设置错误会导致非物理解：
    • 雷诺数过高（>1e6）却用层流
    • 粘度为负值或极大值
    • 密度不合理（如空气密度设为1000）
    • 时间步与物理时间尺度不匹配

    典型错误：
    • 单位错误（mm当m用）
    • 数量级错误（1e-6写成1e6）
    • 温度单位错误（用摄氏度而非开尔文）
  solution: |
    参数检查清单：
    □ 粘度单位是m²/s（运动粘度）还是Pa·s（动力粘度）
    □ 密度值是否合理（水~1000，空气~1.2）
    □ 雷诺数是否在预期范围
    □ 特征长度和速度是否匹配

    参考值：
    • 水(20°C)：ν=1e-6 m²/s，ρ=1000 kg/m³
    • 空气(20°C)：ν=1.5e-5 m²/s，ρ=1.2 kg/m³
    • 声速：空气~340 m/s，水~1500 m/s
