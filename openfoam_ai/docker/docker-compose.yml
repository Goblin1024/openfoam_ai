version: '3.8'

services:
  openfoam-ai:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: openfoam-ai:latest
    container_name: openfoam-ai-agent
    
    # 环境变量
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PYTHONUNBUFFERED=1
    
    # 卷映射
    volumes:
      - ../:/workspace/openfoam_ai
      - ./cases:/workspace/cases
      - ./memory:/workspace/memory
    
    # 工作目录
    working_dir: /workspace/openfoam_ai
    
    # 保持容器运行
    stdin_open: true
    tty: true
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    
    # 网络
    networks:
      - openfoam-network

networks:
  openfoam-network:
    driver: bridge
