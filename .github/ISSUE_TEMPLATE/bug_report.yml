---
name: Bug 报告
description: 报告一个 Bug 以帮助我们改进
title: "[Bug] 请在此处填写简洁的标题"
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        感谢您花时间报告 Bug！请尽可能详细地填写以下信息，以便我们快速定位问题。
        
  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 请清晰简洁地描述 Bug 是什么
      placeholder: Bug 描述...
    validations:
      required: true
      
  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 请提供详细的步骤让我们可以复现这个 Bug
      placeholder: |
        1. 执行 '...'
        2. 点击 '...'
        3. 观察到 '...'
    validations:
      required: true
      
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 请描述您期望发生的行为
      placeholder: 预期行为...
    validations:
      required: true
      
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 请描述实际发生的行为
      placeholder: 实际行为...
    validations:
      required: true
      
  - type: textarea
    id: logs
    attributes:
      label: 错误日志
      description: 请复制粘贴任何相关的错误日志或截图
      render: shell
      
  - type: input
    id: python-version
    attributes:
      label: Python 版本
      description: 您使用的 Python 版本是什么？
      placeholder: 例如：3.10.12
      
  - type: input
    id: os
    attributes:
      label: 操作系统
      description: 您使用的操作系统是什么？
      placeholder: 例如：Windows 11, Ubuntu 22.04, macOS 13
      
  - type: input
    id: openfoam-version
    attributes:
      label: OpenFOAM 版本（如适用）
      description: 您使用的 OpenFOAM 版本是什么？
      placeholder: 例如：Foundation v11, ESI v2312
      
  - type: checkboxes
    id: terms
    attributes:
      label: 确认
      description: 请确认以下事项
      options:
        - label: 我已经搜索了现有的 Issue，没有发现重复的问题
          required: true
        - label: 我已经尝试过使用最新版本的代码
          required: true
