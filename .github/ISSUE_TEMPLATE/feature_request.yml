---
name: 功能建议
description: 提出一个新功能或改进建议
title: "[Feature] 请在此处填写简洁的标题"
labels: ["enhancement", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        感谢您提出功能建议！请尽可能详细地填写以下信息，帮助我们理解您的需求。
        
  - type: textarea
    id: problem
    attributes:
      label: 相关问题
      description: 您的功能建议是否与某个问题相关？请描述
      placeholder: 我遇到的问题是...
    validations:
      required: false
      
  - type: textarea
    id: solution
    attributes:
      label: 建议的解决方案
      description: 请描述您希望看到的功能或改进
      placeholder: 我希望可以...
    validations:
      required: true
      
  - type: textarea
    id: alternatives
    attributes:
      label: 其他替代方案
      description: 您是否考虑过其他替代方案？
      placeholder: 替代方案...
    validations:
      required: false
      
  - type: textarea
    id: context
    attributes:
      label: 附加信息
      description: 任何其他背景信息、截图或示例代码
      placeholder: 附加信息...
    validations:
      required: false
      
  - type: checkboxes
    id: contribution
    attributes:
      label: 贡献意愿
      description: 您是否愿意帮助实现这个功能？
      options:
        - label: 我愿意提交 PR 来实现这个功能
        - label: 我可以帮忙测试这个功能
        
  - type: checkboxes
    id: terms
    attributes:
      label: 确认
      description: 请确认以下事项
      options:
        - label: 我已经搜索了现有的 Issue，没有发现重复的建议
          required: true
